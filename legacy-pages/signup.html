<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - GISEK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        .signup-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 24px;
            color: #1a1a2e;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-submit:hover {
            background: #4f46e5;
        }
        .selected-course {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .payment-details {
            background: #fef3c7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #6366f1;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Register for Your Course</h1>
        
        <div class="selected-course" id="selectedCourseDisplay">
            Loading selected course...
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" required>
            </div>
            
            <div class="payment-details" id="paymentDetails">
                <h3>💰 Payment Instructions</h3>
                <p>Bank Transfer to:</p>
                <p><strong>Bank:</strong> GTBank<br>
                <strong>Account Name:</strong> GISEK Technologies<br>
                <strong>Account Number:</strong> 0123456789</p>
                <p>Amount: <strong id="amountDisplay">₦0</strong></p>
                <p><small>After payment, upload your receipt below. Your account will be activated within 24 hours.</small></p>
            </div>

            <div class="form-group">
                <label>Upload Payment Receipt</label>
                <input type="file" id="receipt" accept="image/*,.pdf">
            </div>

            <button type="submit" class="btn-submit">Complete Registration</button>
        </form>
        
        <a href="courses.html" class="back-link">← Back to Courses</a>
    </div>

    <script>
        // Load selected course from localStorage
        const selectedCourse = JSON.parse(localStorage.getItem('selectedCourse'));
        
        if (!selectedCourse) {
            document.getElementById('selectedCourseDisplay').innerHTML = 
                '<p style="color:red;">No course selected. <a href="courses.html">Go back to courses</a></p>';
        } else {
            // Find the full course details from our data
            fetch('../data/courses.json')
                .then(res => res.json())
                .then(data => {
                    const course = data.courses.find(c => c.id === selectedCourse.id);
                    if (course) {
                        document.getElementById('selectedCourseDisplay').innerHTML = `
                            <strong>✅ Selected Course:</strong> ${course.name}<br>
                            <strong>💰 Price:</strong> ${course.price}<br>
                            <strong>⏱️ Duration:</strong> ${course.duration}
                        `;
                        document.getElementById('amountDisplay').innerText = course.price;
                    }
                })
                .catch(err => {
                    console.error('Error loading course:', err);
                });
        }

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                courseId: selectedCourse?.id,
                courseName: selectedCourse?.name,
                paymentReceipt: document.getElementById('receipt').files[0]?.name || 'pending',
                status: 'pending_verification',
                enrolledAt: new Date().toISOString()
            };
            
            // Store student data in localStorage (temp until backend is ready)
            const existingStudents = JSON.parse(localStorage.getItem('gisek_students') || '[]');
            existingStudents.push(formData);
            localStorage.setItem('gisek_students', JSON.stringify(existingStudents));
            
            // Store current user session
            localStorage.setItem('currentUser', JSON.stringify({
                email: formData.email,
                name: formData.fullName,
                course: formData.courseName
            }));
            
            alert('✅ Registration submitted! Your account will be activated once payment is verified.');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
